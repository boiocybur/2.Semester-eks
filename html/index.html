<!doctype html>
<!-- Fortæller browseren, at dette er et HTML5-dokument -->

<html lang="da">
  <!-- Starter HTML-dokumentet. -->

  <head>
    <!-- Head-sektionen indeholder metadata og eksterne filer (ikke synligt indhold) -->

    <meta charset="UTF-8" />
    <!-- Angiver tegnkodning, så æ, ø og å vises korrekt -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Gør siden responsiv og mobilvenlig -->

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Henter Font Awesome ikoner (bruges til menu, sociale medier osv.) -->

    <link rel="stylesheet" href="../css/style.css" />
    <!-- Henter den generelle stylesheet til sitet (ingen pris-specifik CSS her) -->

    <title>Forside for læring af video til jobsamtaler</title>
    <!-- Titel der vises i browser-fanen (SEO-vigtig) -->
  </head>

  <body>
    <!-- Starter det synlige indhold på siden -->

    <main>
      <!-- Hovedindholdet på siden (semantisk korrekt) -->

      <section class="video-container">
        <!-- Hero-sektion med baggrundsvideo (fullscreen video) -->

        <video
          preload="metadata"
          aria-label="Video, der gør et eller andet"
          autoplay
          loop
          muted
          playsinline
        >
          <!-- Video-element med flere egenskaber: -->

          <!-- preload="metadata"  = Henter kun metadata først (hurtigere indlæsning) -->
          <!-- aria-label          = Tilgængelighed (skærmlæsere) -->
          <!-- autoplay            = Starter videoen automatisk -->
          <!-- loop                = Videoen gentages i loop -->
          <!-- muted               = Videoen starter uden lyd (kræves for autoplay i de fleste browsere) -->
          <!-- playsinline         = Afspiller videoen inde i siden på mobil (uden fullscreen) -->

          <source src="../image/forside.mp4" type="video/mp4" />
          <!-- Video-kilde (MP4-format) -->

          Din browser understøtter ikke video-tagget.
          <!-- Fallback-tekst hvis browseren ikke kan afspille video -->
        </video>

        <a href="book.html">Book din video</a>
        <!-- Call-to-Action knap oven på videoen (typisk stor og iøjnefaldende) -->
      </section>
    </main>

    <footer class="footer">
      <!-- Footer-sektionen i bunden af siden -->

      <div class="footer-left">
        <!-- Venstre del af footeren -->
        <p><a href="kontakt.html">B2B</a></p>
        <p><a href="kontakt.html">Kontakt support</a></p>
      </div>

      <div class="footer-right">
        <!-- Højre del med sociale medier -->
        <div class="social-icons">
          <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
          <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          <a href="#" aria-label="Instagram"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
    </footer>

    <script src="../js/script.js"></script>
    <!-- Indlæser JavaScript-filen (burger-menu, eventuelle animationer osv.) -->
  </body>
</html>
